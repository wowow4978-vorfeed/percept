name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# All jobs are gated on `Cargo.toml` existing somewhere in the tree so they
# cleanly skip (and count as passing for branch protection) until the first
# code slice lands.

jobs:
  fmt:
    if: hashFiles('**/Cargo.toml') != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    if: hashFiles('**/Cargo.toml') != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    if: hashFiles('**/Cargo.toml') != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  check-arm:
    if: hashFiles('**/Cargo.toml') != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-unknown-linux-gnu
      - uses: mlugg/setup-zig@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - run: cargo zigbuild --workspace --target aarch64-unknown-linux-gnu

  deny:
    if: hashFiles('**/Cargo.toml') != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
